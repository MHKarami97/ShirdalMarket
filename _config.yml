title: "فروشگاه شیردال"
description: "خرید آنلاین محصولات با کیفیت"
url: "https://shirdalmarket.ir/"
baseurl: "/"
lang: "fa"
direction: "rtl"

author:
  name: "شیردال"
  email: "info@shirdalmarket.com"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

paginate: 12
paginate_path: "/products/page:num/"

collections:
  products:
    output: true
    permalink: /products/:slug/
  pages:
    output: true
    permalink: /:path/   

defaults:
  - scope:
      path: ""
      type: "products"
    values:
      layout: "product"
  - scope:
      path: "_pages"
    values:
      layout: "page"

exclude:
  - node_modules/
  - vendor/
  - package.json
  - package-lock.json
  - tailwind.config.js
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

twitter:
  username: shirdalmarket
social:
  name: "فروشگاه شیردال"
  links:
    - https://www.instagram.com/shirdalmarket
    - https://t.me/shirdalmarket_ir

date_format: "%Y/%m/%d"

sass:
  style: compressed

markdown: kramdown

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge